version: '3.8'

services:
  workflow-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-manager-dev
    ports:
      - "8000:8000"   # HTTP API
      - "50051:50051" # gRPC
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:///./data/workflow_manager.db
      - GRPC_ENDPOINT=0.0.0.0:50051
      - GRPC_ENABLED=true
      - EXTERNAL_API_URL=http://localhost:8080
      - EXTERNAL_API_TIMEOUT=30
      - SCHEDULER_ENABLED=true
      - SCHEDULER_INTERVAL_SECONDS=5
      - LOG_LEVEL=DEBUG
    volumes:
      - ./data:/data
      - .:/app  # Mount source for development
    networks:
      - workflow-network
    restart: unless-stopped
    command: ["uvicorn", "workflow_manager.__main__:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

networks:
  workflow-network:
    driver: bridge
