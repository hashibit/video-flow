syntax = "proto3";

import "google/protobuf/timestamp.proto";

package task_workflow;

// JobInfo represents a workflow job
// Note: Multiple JobInfo may correspond to one Task
message JobInfo {
  uint64 id = 1;
  uint64 task_id = 2;
  string task_json = 3;  // Full task details in JSON format
}

// JobReport represents the result of a job execution
message JobReport {
  uint64 id = 1;
  string name = 2;
  string value_json = 3;  // Result data in JSON format
  string message = 4;     // Error or status messages
  google.protobuf.Timestamp created_at = 5;
}

// JobEvent represents an event in job lifecycle
message JobEvent {
  uint64 id = 1;
  uint64 job_id = 2;
  uint64 task_id = 3;
  string name = 4;
  string algo = 5;
  google.protobuf.Timestamp created_at = 6;
}

// Request to get next available job for execution
message GetJobRequest {
  string worker_id = 1;  // Worker identifier
}

// Response containing job to execute
message GetJobResponse {
  JobInfo job_info = 1;
}

// Request to submit job execution results
message CreateReportRequest {
  uint64 job_id = 1;
  uint64 task_id = 2;
  JobReport job_report = 3;
}

// Response after submitting report
message CreateReportResponse {
  uint64 job_id = 1;
  uint64 task_id = 2;
  JobReport job_report = 3;
}

// Worker heartbeat request
message HeartbeatRequest {
  string worker_id = 1;
  repeated uint64 running_job_ids = 2;  // List of currently running job IDs
}

// Heartbeat acknowledgment
message HeartbeatResponse {
  string worker_id = 1;
}

// JobManagerService provides interfaces for job distribution and result collection
service JobManagerService {
  // GetJob returns the next available job for a worker to execute
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {}

  // CreateReport submits job execution results
  rpc CreateReport(CreateReportRequest) returns (CreateReportResponse) {}

  // Heartbeat allows workers to send periodic health checks
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
}
