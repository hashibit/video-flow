version: '3.8'

services:
  workflow-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-manager
    ports:
      - "8000:8000"   # HTTP API
      - "50051:50051" # gRPC
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://workflow:workflow123@postgres:5432/workflow_manager
      - GRPC_ENDPOINT=0.0.0.0:50051
      - GRPC_ENABLED=true
      - EXTERNAL_API_URL=http://external-api:8080
      - EXTERNAL_API_TIMEOUT=30
      - SCHEDULER_ENABLED=true
      - SCHEDULER_INTERVAL_SECONDS=5
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - workflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres
    environment:
      - POSTGRES_USER=workflow
      - POSTGRES_PASSWORD=workflow123
      - POSTGRES_DB=workflow_manager
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - workflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  workflow-network:
    driver: bridge
