syntax = "proto3";

package base;

message TrafficEnv {
    bool open = 1;
    string env = 2;
}

message Base {
    string log_id = 1;
    string caller = 2;
    string addr = 3;
    string client = 4;
    TrafficEnv traffic_env = 5;
    map<string, string> extra = 6;
}

message BaseResp {
    string status_message = 1;
    int32 status_code = 2;
    map<string, string> extra = 3;
}
