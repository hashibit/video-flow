syntax = "proto3";

import "base.proto";

package ocr;

message TextRect {
    int32 x = 1;
    int32 y = 2;
    int32 width = 3;
    int32 height = 4;
}

message TextRotatedRect {
    int32 x0 = 1;
    int32 y0 = 2;
    int32 x1 = 3;
    int32 y1 = 4;
    int32 x2 = 5;
    int32 y2 = 6;
    int32 x3 = 7;
    int32 y3 = 8;
}

message OCRSerReq {
    string image_name = 1;
    bytes image_data = 2;
    string caller = 3;
    base.Base base = 4;
}

message OCRSerRsp {
    string status = 1;
    repeated string res = 2;
    base.BaseResp base_resp = 3;
}

message OCRSerBatchReq {
    repeated string image_name_batch = 1;
    repeated bytes image_data_batch = 2;
    bool crop_flag = 3;
    base.Base base = 4;
}

message OCRSerBatchRsp {
    repeated string res = 1;
    base.BaseResp base_resp = 2;
}

message TextLocateRsp {
    string status = 1;
    TextRect img_rect = 2;
    repeated TextRect char_rect = 3;
    repeated TextRect line_rect = 4;
    repeated double char_score = 5;
    repeated TextRotatedRect line_rotated_rect = 6;
    base.BaseResp base_resp = 7;
}

message CharLocateBatchRsp {
    repeated TextRect img_rect = 1;
    repeated string line_text = 2;
    repeated TextRect line_rect = 3;
    repeated TextRect char_rect = 4;
    repeated double char_score = 5;
    repeated TextRotatedRect line_rotated_rect = 6;
    base.BaseResp base_resp = 7;
}

message SensitiveWordsRsp {
    string status = 1;
    TextRect img_rect = 2;
    repeated string line_text = 3;
    repeated TextRect line_rect = 4;
    repeated TextRect char_rect = 5;
    repeated double char_score = 6;
    repeated TextRotatedRect line_rotated_rect = 7;
    repeated string sensitive_words = 8;
    repeated double sensitive_words_prob = 9;
    double risk_value = 10;
    double safe_value = 11;
    base.BaseResp base_resp = 12;
}

message SensitiveWordsBatchRsp {
    repeated TextRect img_rect = 1;
    repeated string line_text = 2;
    repeated TextRect line_rect = 3;
    repeated TextRect char_rect = 4;
    repeated double char_score = 5;
    repeated TextRotatedRect line_rotated_rect = 6;
    repeated string sensitive_words = 7;
    repeated double sensitive_words_prob = 8;
    double risk_value = 9;
    double safe_value = 10;
    base.BaseResp base_resp = 11;
}

message TextDetectRsp {
    repeated TextRect line_rect = 1;
    base.BaseResp base_resp = 2;
}

message CharLocateRsp {
    string status = 1;
    TextRect img_rect = 2;
    repeated string line_text = 3;
    repeated TextRect line_rect = 4;
    repeated TextRect char_rect = 5;
    repeated double char_score = 6;
    repeated TextRotatedRect line_rotated_rect = 7;
    base.BaseResp base_resp = 8;
}

message TextLocateBatchRsp {
    repeated TextRect img_rect = 1;
    repeated TextRect line_rect = 2;
    repeated TextRect char_rect = 3;
    repeated double char_score = 4;
    repeated TextRotatedRect line_rotated_rect = 5;
    base.BaseResp base_resp = 6;
}

message TextExtractRsp {
    repeated TextRect line_rect = 1;
    repeated string line_text = 2;
    base.BaseResp base_resp = 3;
}

message OCRSerReqSettings {
    int32 sample_interval = 1;
    int32 max_frame_num = 2;
    int32 detect_large_text = 3;
    int32 detect_long_text = 4;
    int32 detect_only = 5;
    int32 read_emoji = 6;
    int32 hd_mode = 7;
}

message Point {
    double x = 1;
    double y = 2;
}

message TagPredict {
    int32 tag_id = 1;
    double prob = 2;
    string tag_name = 3;
    string model_name = 4;
    map<string, string> extra = 5;
    repeated Point points = 6;
    double norm_prob = 7;
}

message TagPredictResult {
    repeated TagPredict predicts = 1;
    repeated double embeding = 2;
    int32 confirmed_tag_id = 3;
    string confirmed_tag_name = 4;
}

message ImageInfo {
    string image_url = 1;
    bytes image_data = 2;
}

message ImagesPredictReq {
    repeated ImageInfo images = 1;
    map<string, string> extra = 2;
    base.Base base = 3;
}

message VideoPredictReq {
    string video_url = 1;
    repeated ImageInfo frames = 2;
    map<string, string> extra = 3;
    base.Base base = 4;
}

message ModelVersion {
    string model_version = 1;
}

message TagPredictRsp {
    TagPredictResult predict_result = 1;
    ModelVersion model_version = 2;
    base.BaseResp base_resp = 3;
}

message MTagPredictRsp {
    repeated TagPredictResult predict_results = 1;
    ModelVersion model_version = 2;
    base.BaseResp base_resp = 3;
}

service OCRService {
    rpc ReadScreenImg(OCRSerReq) returns (OCRSerRsp);
    rpc Read_Screen_Img(OCRSerReq) returns (OCRSerRsp);
    rpc ReadTextAndLocateChars(OCRSerReq) returns (CharLocateRsp);
    rpc Read_text_and_locate_chars(OCRSerReq) returns (CharLocateRsp);
    rpc LocateTextAdv(OCRSerReq) returns (TextLocateRsp);
    rpc Locate_text_adv(OCRSerReq) returns (TextLocateRsp);
    rpc ReadTextAndLocateCharsBatch(OCRSerBatchReq) returns (CharLocateBatchRsp);
    rpc ReadScreenImgBatch(OCRSerBatchReq) returns (OCRSerBatchRsp);
    rpc LocateTextAdvBatch(OCRSerBatchReq) returns (TextLocateBatchRsp);
    rpc SensitiveWords(OCRSerReq) returns (SensitiveWordsRsp);
    rpc SensitiveWordsBatch(OCRSerBatchReq) returns (SensitiveWordsBatchRsp);
    rpc PredictVideo(VideoPredictReq) returns (TagPredictRsp);
    rpc PredictImages(ImagesPredictReq) returns (MTagPredictRsp);
}
