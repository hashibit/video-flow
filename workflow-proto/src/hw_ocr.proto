syntax = "proto3";

import "base.proto";

package hw_ocr;

message TextRotatedRect {
    int32 x0 = 1;
    int32 y0 = 2;
    int32 x1 = 3;
    int32 y1 = 4;
    int32 x2 = 5;
    int32 y2 = 6;
    int32 x3 = 7;
    int32 y3 = 8;
}

enum LineType {
    MachinePrinted = 0;
    Handwrittern = 1;
}

message HwReq {
    string image_name = 1;
    bytes image_data = 2;
    string image_url = 3;
    base.Base base = 4;
}

message OCRHwRsp {
    string image_name = 1;
    repeated TextRotatedRect line_poly = 2;
    repeated string line_text = 3;
    repeated LineType line_type = 4;
    base.BaseResp base_resp = 5;
}

service OCRHwService {
    rpc GetGeneralHwOcr(HwReq) returns (OCRHwRsp);
}
