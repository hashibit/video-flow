syntax = "proto3";

import "base.proto";

package ocr_ehd_warp;

message Point {
    int32 x = 1;
    int32 y = 2;
}

message Poly {
    repeated Point bounds = 1;
    repeated Point points = 2;
    double poly_prob = 3;
    bytes image_page = 4;
}

message OcrRequest {
    bytes image = 1;
    string image_url = 2;
    string image_name = 3;
    string signature = 4;
    map<string, string> parameter = 5;
    base.Base base = 6;
}

message OcrResponse {
    int32 num_poly = 1;
    repeated Poly pages = 2;
    base.BaseResp base_resp = 3;
}

service OcrEHDWarpService {
    rpc OcrWarp(OcrRequest) returns (OcrResponse);
}
