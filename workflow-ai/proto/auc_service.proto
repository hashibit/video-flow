syntax = "proto3";

import "base.proto";

package auc;

enum AucCode {
    AUC_CODE_UNKNOWN = 0;
    SUCCESS = 1000;
    INVALID_REQUEST = 1001;
    PERMISSION_DENIED = 1002;
    LIMIT_QPS = 1003;
    LIMIT_COUNT = 1004;
    SERVER_BUSY = 1005;
    INTERRUPTED = 1006;
    LONG_AUDIO = 1010;
    LARGE_PACKET = 1011;
    INVALID_FORMAT = 1012;
    SILENT_AUDIO = 1013;
    EMPTY_AUDIO = 1014;
    TIMEOUT_PENDING = 1020;
    TIMEOUT_PROCESSING = 1021;
    ERROR_PROCESSING = 1022;
    ERROR_UNKNOWN = 1099;
    ONGOING = 2000;
    PENDING = 2001;
}

message AucApp {
    string appid = 1;
    string token = 2;
    map<string, string> params = 3;
}

message AucUser {
    string uid = 1;
    map<string, string> params = 2;
}

message AucAudio {
    string format = 1;
    string url = 2;
    string codec = 3;
    int32 rate = 4;
    int32 bits = 5;
    int32 channel = 6;
    map<string, string> params = 7;
}

message AucReq {
    string callback = 1;
    map<string, string> params = 2;
}

message Word {
    string text = 1;
    int32 start_time = 2;
    int32 end_time = 3;
    int32 blank_duration = 4;
    string pronounce = 5;
}

message Utterance {
    string text = 1;
    int32 start_time = 2;
    int32 end_time = 3;
    bool definite = 4;
    repeated Word words = 5;
    map<string, string> additions = 6;
}

message AucQueryResp {
    string id = 1;
    AucCode code = 2;
    string message = 3;
    string result_url = 4;
    string text = 5;
    repeated Utterance utterances = 6;
    map<string, string> additions = 7;
}

message AucSubmitResp {
    AucCode code = 1;
    string message = 2;
    string id = 3;
}

message AucSubmitRequest {
    AucApp app = 1;
    AucUser user = 2;
    AucAudio audio = 3;
    AucReq req = 4;
    map<string, string> additions = 5;
    base.Base base = 6;
}

message AucSubmitResponse {
    AucSubmitResp resp = 1;
    base.BaseResp base_resp = 2;
}

message AucQueryRequest {
    string appid = 1;
    string id = 2;
    string token = 3;
    bool wait_final_result = 4;
    map<string, string> additions = 5;
    base.Base base = 6;
}

message AucQueryResponse {
    AucQueryResp resp = 1;
    base.BaseResp base_resp = 2;
}

service AucService {
    rpc Submit(AucSubmitRequest) returns (AucSubmitResponse);
    rpc Query(AucQueryRequest) returns (AucQueryResponse);
}
